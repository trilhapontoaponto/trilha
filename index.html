<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trilha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&family=Source+Serif+4:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    padding: 2rem;
  }

  @media (prefers-reduced-motion: no-preference) {
    .marca {
      animation: subir 0.5s ease-out;
    }
    @keyframes subir {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  }
</style>
</head>
<body>
  <main>
    <div class="marca">
      <svg class="simbolo" viewBox="0 0 200 90" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Símbolo Trilha: sequência de pontos conectados">
        <line x1="20" y1="70" x2="180" y2="20" stroke="oklch(32% 0.09 258)" stroke-width="2" stroke-linecap="round" />
        <circle cx="20" cy="70" r="7" fill="oklch(32% 0.09 258)" />
        <circle cx="60" cy="58" r="7" fill="oklch(32% 0.09 258)" />
        <circle cx="100" cy="45" r="7" fill="oklch(32% 0.09 258)" />
        <circle cx="140" cy="33" r="7" fill="oklch(98% 0.006 90)" stroke="oklch(32% 0.09 258)" stroke-width="2" />
        <circle cx="180" cy="20" r="8" fill="oklch(52% 0.11 75)" />
      </svg>
      <span class="nome">Trilha</span>
      <span class="slogan">estudos de ponto a ponto.</span>
    </div>

    <p id="statusTeste" class="status">Conectando ao banco de dados…</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    // ⚠️ Substituir pelos dados reais do projeto Supabase (Settings → API)
    const SUPABASE_URL = "https://gusxctrzgtkxzxdbagrr.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_VjmPl2JDJ9cbDtrJY8dTQw_SvlFPSAX";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const statusEl = document.getElementById("statusTeste");

    async function testarConexao() {
      const { data, error } = await supabase
        .from("teste")
        .select("teste_sucesso")
        .limit(1)
        .single();

      if (error) {
        statusEl.textContent = "Não foi possível conectar ao banco: " + error.message;
        return;
      }

      statusEl.textContent = data.teste_sucesso;
      statusEl.classList.add("ok");
    }

    testarConexao();
  </script>
</body>
</html>
