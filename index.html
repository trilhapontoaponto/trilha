<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trilha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&family=Source+Serif+4:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --papel: oklch(98% 0.006 90);
    --tinta: oklch(18% 0.015 260);
    --azul: oklch(32% 0.09 258);
    --ambar: oklch(52% 0.11 75);
    --grafite: oklch(55% 0.01 260);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--papel);
    color: var(--tinta);
    font-family: 'IBM Plex Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
    padding: 2rem;
  }

  .marca {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.1rem;
  }

  .simbolo {
    width: 148px;
    height: auto;
  }

  .nome {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: 2.1rem;
    letter-spacing: 0.01em;
    color: var(--tinta);
  }

  .slogan {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 400;
    font-size: 0.85rem;
    color: var(--grafite);
    letter-spacing: 0.03em;
    margin-top: -0.5rem;
  }

  .saudacao {
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 400;
    font-size: 0.95rem;
    color: var(--grafite);
    letter-spacing: 0.02em;
  }

  @media (prefers-reduced-motion: no-preference) {
    .marca {
      animation: subir 0.5s ease-out;
    }
    @keyframes subir {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  }
</style>
</head>
<body>
  <main>
    <div class="marca">
      <svg class="simbolo" viewBox="0 0 200 90" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Símbolo Trilha: sequência de pontos conectados">
        <line x1="20" y1="70" x2="180" y2="20" stroke="oklch(32% 0.09 258)" stroke-width="2" stroke-linecap="round" />
        <circle cx="20" cy="70" r="7" fill="oklch(32% 0.09 258)" />
        <circle cx="60" cy="58" r="7" fill="oklch(32% 0.09 258)" />
        <circle cx="100" cy="45" r="7" fill="oklch(32% 0.09 258)" />
        <circle cx="140" cy="33" r="7" fill="oklch(98% 0.006 90)" stroke="oklch(32% 0.09 258)" stroke-width="2" />
        <circle cx="180" cy="20" r="8" fill="oklch(52% 0.11 75)" />
      </svg>
      <span class="nome">Trilha</span>
      <span class="slogan">estudos de ponto a ponto.</span>
    </div>
    <p class="saudacao">Hello world</p>
  </main>
</body>
</html>
